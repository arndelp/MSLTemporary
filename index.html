<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>monsalondulivre.fr — Plateforme de livres auto-édités</title>

  <meta name="description"
    content="monsalondulivre.fr : plateforme d'achat et de vente de livres auto-édités. Ouverture prochaine." />

  <meta name="author" content="Arnaud DELPIERRE" />

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;

      background: linear-gradient(135deg, #7c2808, #ffffff);

      display: flex;
      justify-content: center;
      align-items: center;

      padding: 20px;
      text-align: center;
      color: white;
    }

    .container {
      max-width: 600px;
      width: 100%;

      padding: 40px;

      background: rgba(0, 0, 0, 0.35);

      border-radius: 16px;

      backdrop-filter: blur(6px);

      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
    }

    .logo {
      width: 100%;
      max-width: 320px;
      height: auto;

      margin-bottom: 30px;
    }

    h1 {
      font-size: 2.2rem;
      margin-bottom: 15px;
    }

    p {
      font-size: 1.1rem;
      line-height: 1.6;
      margin-bottom: 18px;
    }

    .bold {
      font-weight: bold;
    }

    .btn {
      display: inline-block;

      margin-top: 10px;

      padding: 12px 22px;

      border-radius: 8px;

      background: white;
      color: #7c2808;

      text-decoration: none;
      font-weight: bold;

      transition: all 0.2s ease;
    }

    .btn:hover {
      background: #f0f0f0;
      transform: translateY(-2px);
    }

    .footer {
      margin-top: 30px;

      font-size: 0.9rem;
      opacity: 0.8;
    }

    @media (max-width: 600px) {
      .container {
        padding: 30px 20px;
      }

      h1 {
        font-size: 1.8rem;
      }

      p {
        font-size: 1rem;
      }
    }
  </style>
</head>

<body>

  <main class="container">

    <img
      src="./img/transparent-logo.svg"
      alt="Logo monsalondulivre.fr"
      class="logo"
    >

    <h1>Ouverture prochaine</h1>

    <p>
      monsalondulivre.fr, la nouvelle plateforme de vente de
      <span class="bold">livres auto-édités</span>,
      arrive bientôt !
    </p>

    <p>
      Revenez prochainement pour découvrir le projet.
    </p>

    <p>
      Vous avez des suggestions ou des attentes ?
    </p>

    <a class="btn" href="mailto:admin@monsalondulivre.fr">
      Nous contacter
    </a>

    <div class="footer">
      © 2026 — monsalondulivre.fr
    </div>

  </main>

</body>

</html>
